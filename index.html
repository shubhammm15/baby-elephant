<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎁</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  overflow: hidden;
}

/* 🐻 Animals */
.animal {
  position: absolute;
  width: 45px;
  animation: float 12s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

/* ✨ Glitter */
.glitter {
  position: absolute;
  width: 8px;
  height: 8px;
  background: pink;
  border-radius: 50%;
  animation: sparkle 5s linear infinite;
}

@keyframes sparkle {
  0% { transform: translateY(100vh); opacity:0; }
  50% { opacity:1; }
  100% { transform: translateY(-10vh); opacity:0; }
}

/* 🎁 Intro */
#intro {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.gift {
  font-size: 5rem;
  cursor: pointer;
}

/* 🎉 Main */
#main {
  display: none;
  height: 100vh;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start; /* 🔥 shifted upward */
  padding-top: 80px; /* 🔥 control top spacing */
  text-align: center;
}

/* 🎂 Heading */
h1 {
  font-size: 2rem;
  margin-bottom: 20px;
}

/* 💌 Message container */
#message {
  width: 90%;
  max-width: 320px;
}

/* 💖 Styled lines */
.line {
  opacity: 0;
  margin-top: 12px;
  transition: all 0.8s ease;
}

.line1 {
  font-size: 1rem;
}

.line2 {
  font-size: 1.2rem;
  color: #ffe4ec;
  font-weight: bold;
}

.line3 {
  font-size: 1rem;
  font-style: italic;
}

.line4 {
  font-size: 1.1rem;
  letter-spacing: 1px;
}

.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<!-- 🐻 Animals -->
<img class="animal" src="https://cdn-icons-png.flaticon.com/512/616/616408.png" style="left:10%;">
<img class="animal" src="https://cdn-icons-png.flaticon.com/512/1998/1998627.png" style="left:40%;">
<img class="animal" src="https://cdn-icons-png.flaticon.com/512/3069/3069172.png" style="left:70%;">

<!-- ✨ Glitter -->
<div class="glitter" style="left:20%;"></div>
<div class="glitter" style="left:50%;"></div>
<div class="glitter" style="left:80%;"></div>

<!-- 🎁 Intro -->
<div id="intro">
  <div class="gift" onclick="openGift()">🎁</div>
  <p>Tap to open your surprise 💖</p>
</div>

<!-- 🎉 Main -->
<div id="main">
  <h1>🎉 Happiest Birthday Kinjal 🎂</h1>

  <div id="message">
    <div class="line line1"></div>
    <div class="line line2"></div>
    <div class="line line3"></div>
    <div class="line line4"></div>
  </div>
</div>

<!-- 🎆 Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function openGift() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.display = "flex";

  startTyping();
  startConfetti();
}

function startTyping() {
  let lines = [
    "Wishing you...",
    "fall in love with life again 💖",
    "every single day ✨",
    "Stay magical always 🫶"
  ];

  let i = 0;

  function showLine() {
    if (i < lines.length) {
      let el = document.querySelector(".line" + (i + 1));
      el.innerHTML = lines[i];
      el.classList.add("show");
      i++;
      setTimeout(showLine, 800);
    }
  }

  showLine();
}

function startConfetti() {
  setInterval(() => {
    confetti({
      particleCount: 120,
      spread: 80,
      origin: { y: 0.6 }
    });
  }, 2000);
}
</script>

</body>
</html>
