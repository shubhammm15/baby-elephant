<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎁</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  overflow: hidden;
}

/* 🐻 Floating Animals */
.animal {
  position: absolute;
  width: 45px;
  animation: float 12s linear infinite;
  opacity: 0.9;
}

@keyframes float {
  0% { transform: translateY(100vh) translateX(0); }
  100% { transform: translateY(-10vh) translateX(60px); }
}

/* ✨ Pink Glitter */
.glitter {
  position: absolute;
  width: 8px;
  height: 8px;
  background: pink;
  border-radius: 50%;
  opacity: 0.8;
  animation: sparkle 5s linear infinite;
}

@keyframes sparkle {
  0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* 🎁 Intro */
#intro {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.gift {
  font-size: 5rem;
  cursor: pointer;
  animation: bounce 1.5s infinite;
}

.tap-text {
  margin-top: 20px;
  font-size: 1.2rem;
}

/* 🎉 Main */
#main {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.container {
  padding: 20px;
  max-width: 350px;
  width: 90%;
  animation: fadeIn 1.5s ease;
}

h1 {
  font-size: 2rem;
}

#message {
  font-size: 1rem;
  margin-top: 15px;
  min-height: 40px;
}

/* ✨ Animations */
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- 🐻 Animals -->
<img class="animal" src="https://cdn-icons-png.flaticon.com/512/616/616408.png" style="left:10%; animation-delay:0s;">
<img class="animal" src="https://cdn-icons-png.flaticon.com/512/616/616430.png" style="left:25%; animation-delay:2s;">
<img class="animal" src="https://cdn-icons-png.flaticon.com/512/1998/1998627.png" style="left:40%; animation-delay:4s;"> <!-- 🐘 Elephant -->
<img class="animal" src="https://cdn-icons-png.flaticon.com/512/3069/3069172.png" style="left:60%; animation-delay:1s;"> <!-- 🦢 Swan -->
<img class="animal" src="https://cdn-icons-png.flaticon.com/512/616/616408.png" style="left:75%; animation-delay:3s;">
<img class="animal" src="https://cdn-icons-png.flaticon.com/512/3069/3069172.png" style="left:90%; animation-delay:5s;">

<!-- ✨ Glitter particles -->
<div class="glitter" style="left:15%; animation-delay:0s;"></div>
<div class="glitter" style="left:30%; animation-delay:1s;"></div>
<div class="glitter" style="left:45%; animation-delay:2s;"></div>
<div class="glitter" style="left:60%; animation-delay:3s;"></div>
<div class="glitter" style="left:75%; animation-delay:4s;"></div>
<div class="glitter" style="left:90%; animation-delay:5s;"></div>

<!-- 🎁 Intro -->
<div id="intro">
  <div class="gift" onclick="openGift()">🎁</div>
  <div class="tap-text">Tap to open your surprise 💖</div>
</div>

<!-- 🎉 Main -->
<div id="main">
  <div class="container">
    <h1>🎉 Happiest Birthday <span id="name">Kinjal</span> 🎂</h1>
    <div id="message"></div>
  </div>
</div>

<!-- 🎆 Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// 🎁 Open Gift
function openGift() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.display = "flex";

  startTyping();
  startConfetti();
}

// 💌 Typing
let text = "Wishing you fall in love again with life every single day ✨";
let i = 0;

function startTyping() {
  function typing() {
    if (i < text.length) {
      document.getElementById("message").innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 50);
    }
  }
  typing();
}

// 🎆 Confetti
function startConfetti() {
  setInterval(() => {
    confetti({
      particleCount: 120,
      spread: 80,
      origin: { y: 0.6 }
    });
  }, 2000);
}
</script>

</body>
</html>
