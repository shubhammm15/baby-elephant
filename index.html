<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎁</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;

  /* ✅ FIXED BACKGROUND (RAW LINK) */
  background: url("https://raw.githubusercontent.com/shubhammm15/baby-elephant/main/vecteezy_birthday-cake-with-pink-balloons-confetti-and-cupcakes_52749235.jpg") no-repeat center center/cover;

  color: white;
  overflow: hidden;
  position: relative;
}

/* 🌫️ Overlay */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.25);
  top: 0;
  left: 0;
}

/* 🔝 Content above overlay */
#intro, #main {
  position: relative;
  z-index: 2;
}

/* 🐻 Animals */
.animal {
  position: absolute;
  width: 45px;
  opacity: 0.9;
  z-index: 1;
}

.float-up { animation: floatUp 10s linear infinite; }
@keyframes floatUp {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

.float-right { animation: floatRight 12s linear infinite; }
@keyframes floatRight {
  0% { transform: translateX(-10vw); }
  100% { transform: translateX(110vw); }
}

.float-left { animation: floatLeft 12s linear infinite; }
@keyframes floatLeft {
  0% { transform: translateX(110vw); }
  100% { transform: translateX(-10vw); }
}

/* ✨ Glitter */
.glitter {
  position: absolute;
  width: 8px;
  height: 8px;
  background: pink;
  border-radius: 50%;
  animation: sparkle 5s linear infinite;
  z-index: 1;
}

@keyframes sparkle {
  0% { transform: translateY(100vh); opacity:0; }
  50% { opacity:1; }
  100% { transform: translateY(-10vh); opacity:0; }
}

/* 🎁 Intro */
#intro {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.gift {
  font-size: 5rem;
  cursor: pointer;
  animation: bounce 1.5s infinite;
}

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* 🎉 Main */
#main {
  display: none;
  height: 100vh;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 150px;
  text-align: center;
}

/* 🎂 Heading */
h1 {
  font-size: 2rem;
  margin-bottom: 30px;
  text-shadow: 0 0 10px rgba(0,0,0,0.6);
}

/* 💌 Message */
#message {
  width: 90%;
  max-width: 320px;
  margin-top: 10px;
}

.line {
  opacity: 0;
  margin-top: 12px;
  transition: all 0.8s ease;
}

.line1 { font-size: 1rem; }
.line2 { font-size: 1.2rem; color: #ffe4ec; font-weight: bold; }
.line3 { font-size: 1rem; font-style: italic; }

.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<!-- 🎵 Audio -->
<audio id="music">
  <source src="YOUR_AUDIO_LINK_HERE.mp3" type="audio/mp3">
</audio>

<!-- 🐻 Animals -->
<img class="animal float-up" src="https://cdn-icons-png.flaticon.com/512/616/616408.png" style="left:10%;">
<img class="animal float-up" src="https://cdn-icons-png.flaticon.com/512/1998/1998627.png" style="left:50%;">

<img class="animal float-right" src="https://cdn-icons-png.flaticon.com/512/3069/3069172.png" style="top:30%;">
<img class="animal float-right" src="https://cdn-icons-png.flaticon.com/512/616/616430.png" style="top:60%;">

<img class="animal float-left" src="https://cdn-icons-png.flaticon.com/512/1998/1998627.png" style="top:20%;">
<img class="animal float-left" src="https://cdn-icons-png.flaticon.com/512/3069/3069172.png" style="top:70%;">

<!-- ✨ Glitter -->
<div class="glitter" style="left:20%;"></div>
<div class="glitter" style="left:50%;"></div>
<div class="glitter" style="left:80%;"></div>

<!-- 🎁 Intro -->
<div id="intro">
  <div class="gift" onclick="openGift()">🎁</div>
  <p>Tap to open your surprise 💖</p>
</div>

<!-- 🎉 Main -->
<div id="main">
  <h1>🎉 Happiest Birthday Kinjal 🎂</h1>

  <div id="message">
    <div class="line line1"></div>
    <div class="line line2"></div>
    <div class="line line3"></div>
  </div>
</div>

<!-- 🎆 Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function openGift() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.display = "flex";

  document.getElementById("music").play();

  startTyping();
  startConfetti();
}

function startTyping() {
  let lines = [
    "Wishing you...",
    "fall in love again with life 💖",
    "every single day ✨"
  ];

  let i = 0;

  function showLine() {
    if (i < lines.length) {
      let el = document.querySelector(".line" + (i + 1));
      el.innerHTML = lines[i];
      el.classList.add("show");
      i++;
      setTimeout(showLine, 800);
    }
  }

  showLine();
}

function startConfetti() {
  setInterval(() => {
    confetti({
      particleCount: 120,
      spread: 80,
      origin: { y: 0.6 }
    });
  }, 2000);
}
</script>

</body>
</html>
