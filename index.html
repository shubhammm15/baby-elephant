<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎂</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  overflow: hidden;
  text-align: center;
  color: white;
}

.container {
  margin-top: 10%;
}

h1 {
  font-size: 3rem;
}

#message {
  font-size: 1.3rem;
  margin-top: 20px;
  min-height: 50px;
}

/* Photo */
img {
  width: 200px;
  border-radius: 20px;
  margin-top: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<!-- 🎵 Background Music -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<div class="container">
  <h1>🎉 Happy Birthday <span id="name">Someone</span> 🎂</h1>
  
  <!-- 💌 Typing message -->
  <div id="message"></div>

  <!-- 📸 Photo -->
  <img src="https://i.imgur.com/yourphoto.jpg" alt="photo">
</div>

<!-- 🎆 Confetti Script -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// ❤️ Naam change yaha kar
document.getElementById("name").innerText = "Kinjal";

// 💌 Typing effect
let text = "Wishing you all the happiness in the world 💖 You mean a lot to me... Stay amazing always ✨";
let i = 0;

function typing() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 50);
  }
}
typing();

// 🎆 Confetti blast
setInterval(() => {
  confetti({
    particleCount: 100,
    spread: 70,
    origin: { y: 0.6 }
  });
}, 2000);

</script>

</body>
</html>
