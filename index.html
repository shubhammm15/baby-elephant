<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- 📱 Mobile Optimization -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎂</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  overflow: hidden;
  text-align: center;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 📦 Main Container */
.container {
  padding: 20px;
  max-width: 350px;
  width: 90%;
  animation: fadeIn 2s ease;
}

h1 {
  font-size: 2rem;
}

/* 💌 Message */
#message {
  font-size: 1rem;
  margin-top: 15px;
  min-height: 40px;
}

/* 📸 Photo */
img {
  width: 150px;
  border-radius: 15px;
  margin-top: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

/* ✨ Animation */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* 📱 iPhone tweaks */
@media (max-width: 480px) {
  h1 {
    font-size: 1.8rem;
  }

  #message {
    font-size: 0.95rem;
  }

  img {
    width: 130px;
  }
}
</style>
</head>

<body>

<!-- 🎵 Background Music -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<div class="container">
  <h1>🎉 Happiest Birthday <span id="name">Someone</span> 🎂</h1>
  
  <!-- 💌 Typing message -->
  <div id="message"></div>

  <!-- 📸 Photo -->
  <img src="https://i.imgur.com/yourphoto.jpg" alt="photo">
</div>

<!-- 🎆 Confetti Script -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// ❤️ Naam change yaha kar
document.getElementById("name").innerText = "Kinjal";

// 💌 Typing effect message
let text = "Wishing you fall in love again with life every single day ✨";
let i = 0;

function typing() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 50);
  }
}
typing();

// 🎆 Confetti animation
setInterval(() => {
  confetti({
    particleCount: 100,
    spread: 70,
    origin: { y: 0.6 }
  });
}, 2000);

</script>

</body>
</html>
